# Docker Compose - DEV Environment
# Porta: 5433 | Database: plumo_dev

name: gus-plumo-dev

services:
  postgres-dev:
    image: postgres:17
    container_name: plumo-postgres-dev
    environment:
      POSTGRES_DB: plumo_dev
      POSTGRES_USER: plumo
      POSTGRES_PASSWORD: plumo
      PGDATA: /var/lib/postgresql/data
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - plumo-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plumo -d plumo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
    name: plumo_postgres_data_dev

networks:
  plumo-network-dev:
    driver: bridge
    name: plumo-network-dev

